<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Accès Préstige — SkinAI</title>
  <meta name="description" content="Espace sécurisé de la clinique SkinAI Préstige."/>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body class="login-page">

  <div class="login-card animate-up">
    <header class="login-header">
      <div class="login-logo">🔬</div>
      <h1>SkinAI Prestige</h1>
      <p>L'excellence en dermatologie numérique</p>
    </header>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flash-messages" style="margin-bottom: 1.5rem;">
          {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form id="login-form" method="POST" action="/">
      <div class="form-group">
        <label class="form-label" for="username">Identifiant Expert</label>
        <input
          class="form-control"
          type="text"
          id="username"
          name="username"
          placeholder="ex: Dr. Benali"
          required
          autocomplete="username"
        />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Clé de Sécurité</label>
        <input
          class="form-control"
          type="password"
          id="password"
          name="password"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>
      
      <button id="btn-login" type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
        Authentification
      </button>
    </form>

    <footer style="text-align:center; margin-top:2rem; font-size:0.75rem; color:var(--text-dim); opacity: 0.8;">
      Accès restreint au personnel médical autorisé.
    </footer>
  </div>

</body>
</html>
